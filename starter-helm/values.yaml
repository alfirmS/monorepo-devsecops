replicaCount: 1

global:
  env: "{{ GLOBAL_ENV }}"

image:
  repository: "{{ IMAGE_REPOSITORY }}"
  pullPolicy: Always
  tag: "{{ IMAGE_TAG }}"

imagePullSecrets:
  - name: regcred
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}

securityContext: {}

service:
  type: {{ SERVICE_TYPE }}
  containerPort: {{ CONTAINER_PORT }}
  targetPort: {{ CONTAINER_PORT }}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers

resources:
  limits:
    cpu: "{{ CPU_LIMIT }}"
    memory: "{{ MEM_LIMIT }}"
  requests:
    cpu: "{{ CPU_REQUEST }}"
    memory: "{{ MEM_REQUEST }}"

healthCheck:
  enabled: false
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

deployment:
  enabled: true
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 5"]
  terminationGracePeriodSeconds: 30

hpa:
  enabled: {{ HPA_ENABLED }}
  minReplicas: {{ HPA_MIN_REPLICAS }}
  maxReplicas: {{ HPA_MAX_REPLICAS }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ HPA_CPU_TARGET }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ HPA_MEM_TARGET }}

pdb:
  enabled: {{ PDB_ENABLED }}
  minAvailable: {{ PDB_MIN_AVAILABLE }}

externalSecret:
  enabled: {{ EXTERNAL_SECRET_ENABLED }}

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
